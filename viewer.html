<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Point Cloud Viewer</title>

  <link rel="stylesheet" href="./libs/potree/potree.css">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #potree_render_area {
      width: 100%;
      height: 100%;
    }

    /* サイドバー非表示 */
    #potree_sidebar_container {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="potree_render_area"></div>

  <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="./libs/potree/potree.js"></script>

  <script>
    const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

    // 見栄え設定（営業用バランス）
    viewer.setEDLEnabled(true);
    viewer.setFOV(55);
    viewer.setPointBudget(1500000);
    viewer.setBackground("gradient");

    // 点群読み込み（v1はcloud.js）
    Potree.loadPointCloud("./pointclouds/test/cloud.js", "test", e => {
      const pointcloud = e.pointcloud;

      viewer.scene.addPointCloud(pointcloud);

      // 表示設定
      pointcloud.material.size = 0.7;
      pointcloud.material.pointSizeType = Potree.PointSizeType.FIXED;
      pointcloud.material.shape = Potree.PointShape.CIRCLE;
      pointcloud.material.activeAttributeName = "rgba";

      viewer.fitToScreen();
    });
  </script>
</body>
</html>
