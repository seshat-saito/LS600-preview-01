<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LS600 Point Cloud Viewer</title>

  <link rel="stylesheet" href="./libs/potree/potree.css" />
  <link rel="stylesheet" href="./libs/jquery-ui/jquery-ui.min.css" />
  <link rel="stylesheet" href="./libs/perfect-scrollbar/css/perfect-scrollbar.css" />
  <link rel="stylesheet" href="./libs/openlayers3/ol.css" />
  <link rel="stylesheet" href="./libs/spectrum/spectrum.css" />
  <link rel="stylesheet" href="./libs/jstree/themes/mixed/style.css" />

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    #potree_container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #potree_render_area {
      width: 100%;
      height: 100%;
    }

    #potree_sidebar_container {
      display: none;
    }
  </style>
</head>

<body>
  <div id="potree_container">
    <div id="potree_render_area"></div>
    <div id="potree_sidebar_container"></div>
  </div>

  <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="./libs/spectrum/spectrum.js"></script>
  <script src="./libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="./libs/other/BinaryHeap.js"></script>
  <script src="./libs/tween/tween.min.js"></script>
  <script src="./libs/d3/d3.js"></script>
  <script src="./libs/proj4/proj4.js"></script>
  <script src="./libs/openlayers3/ol.js"></script>
  <script src="./libs/i18next/i18next.js"></script>
  <script src="./libs/jstree/jstree.js"></script>
  <script src="./libs/perfect-scrollbar/js/perfect-scrollbar.jquery.js"></script>
  <script src="./libs/three.js/build/three.min.js"></script>
  <script src="./libs/potree/potree.js"></script>

  <script>
    async function checkFile(url) {
      try {
        const res = await fetch(url, { method: "GET" });
        console.log("[CHECK]", url, res.status, res.headers.get("content-type"));
        return res.ok;
      } catch (err) {
        console.error("[CHECK ERROR]", url, err);
        return false;
      }
    }

    async function init() {
      console.log("viewer init start");

      await checkFile("./pointclouds/test/cloud.js");
      await checkFile("./pointclouds/test/data/r/r.hrc");
      await checkFile("./pointclouds/test/data/r/r.bin");

      const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

      viewer.setEDLEnabled(true);
      viewer.setFOV(60);
      viewer.setPointBudget(3000000);
      viewer.setBackground("gradient");

      Potree.loadPointCloud("./pointclouds/test/cloud.js", "test", function (e) {
        console.log("pointcloud loaded", e);

        const pointcloud = e.pointcloud;
        viewer.scene.addPointCloud(pointcloud);

        pointcloud.visible = true;
        pointcloud.material.size = 1.5;
        pointcloud.material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
        pointcloud.material.shape = Potree.PointShape.SQUARE;

        // ここは一旦触らない
        // pointcloud.material.activeAttributeName = "rgba";

        viewer.fitToScreen();

        setTimeout(() => {
          console.log("fitToScreen retry");
          viewer.fitToScreen();
        }, 1000);
      });
    }

    init();
  </script>
</body>
</html>
